# ========================================
# MARIAM - Configuration Nginx Production
# ========================================
#
# Rôles :
# 1. Servir le build React (SPA)
# 2. SPA Routing (toutes les routes inconnues -> index.html)
# 3. Reverse proxy /api/* -> backend Flask

# ========================================
# RATE LIMITING (defense-in-depth, en amont de Flask)
# ========================================
# Zone partagée pour limiter les requêtes API par IP
# 10m = ~160 000 IPs en mémoire, 10r/s = 10 requêtes/seconde par IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Zone plus stricte pour les endpoints d'authentification
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;
# Zone pour le health check
limit_req_zone $binary_remote_addr zone=health_limit:10m rate=5r/s;


server {
    listen 80 default_server;
    # Wildcard tenant hosting: every *.mariam.app subdomain (organization) is
    # served by this block; the Host is forwarded to the backend for resolution.
    server_name _;

    # ========================================
    # REAL CLIENT IP (behind Cloudflare)
    # ========================================
    # The origin only sees Cloudflare's IPs; restore the real visitor IP so that
    # nginx rate limiting (and access logs) key on the client, not on Cloudflare.
    # Ranges from https://www.cloudflare.com/ips/ (keep in sync).
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Max upload size — must match Flask MAX_CONTENT_LENGTH (32 MB) so image
    # uploads are not rejected by nginx with a 413 before reaching the backend.
    client_max_body_size 32m;

    # ========================================
    # SECURITY HEADERS
    # ========================================
    # HSTS: TLS is terminated at Cloudflare; this instructs browsers to stay on HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Content-Security-Policy: enable once the exact origins are known (analytics,
    # Sentry ingest, S3 public bucket). Example to adapt, then move out of comment:
    #   add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; connect-src 'self' https:; style-src 'self' 'unsafe-inline'; object-src 'none'; frame-ancestors 'self'" always;

    # Compression GZIP pour améliorer les performances
    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/wasm application/manifest+json font/ttf font/woff font/woff2;

    root /usr/share/nginx/html;
    index index.html;

    # ========================================
    # 0. ROBOTS.TXT — Contrôle d'accès crawlers & IA
    # ========================================
    location = /robots.txt {
        default_type text/plain;
        # Public menu pages are crawlable; private app routes and the API are not.
        # CCBot (bulk scraping) is blocked entirely. The per-host sitemap lists the
        # organization's site menus.
        return 200 "User-agent: *\nDisallow: /admin\nDisallow: /org\nDisallow: /login\nDisallow: /activate\nDisallow: /reset-password\nDisallow: /notifications\nDisallow: /v1/\n\nUser-agent: CCBot\nDisallow: /\n\nSitemap: https://$host/sitemap.xml\n";
    }

    # ========================================
    # 1. API PROXY
    # ========================================
    # Redirige toutes les requêtes /v1/* et /health vers le container backend
    # Cela permet d'avoir le frontend et le backend sur le même domaine/port
    # C'est la solution la plus robuste pour éviter les problèmes de CORS

    # Health check — non versionné
    location = /health {
        limit_req zone=health_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — rate limit strict (brute force protection)
    location /v1/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API endpoints — rate limit standard
    location /v1 {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        # 'backend' est le nom du service dans docker-compose
        proxy_pass http://backend:5000;

        # Headers nécessaires pour le proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # 2. PRIVATE APP ROUTES (SPA, served statically)
    # ========================================
    # The app's own pages never need the SEO shell — serve index.html directly.
    # Keep this list aligned with the non-public routes in client/src/App.tsx.
    location /admin          { try_files $uri /index.html; }
    location /org            { try_files $uri /index.html; }
    location /login          { try_files $uri /index.html; }
    location /activate       { try_files $uri /index.html; }
    location /reset-password { try_files $uri /index.html; }
    location /notifications  { try_files $uri /index.html; }

    # ========================================
    # 3. PUBLIC PAGES — server-rendered SEO shell
    # ========================================
    # Public menu pages (/, /menu, /<slug>/menu) and /sitemap.xml are proxied to
    # Flask, which injects per-restaurant meta and JSON-LD into the SPA shell.
    # Real static files (assets, manifest, favicons) match their own locations
    # first and are served by nginx; only non-file paths fall through to @shell.
    location = / {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri @shell;
    }

    location @shell {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service Worker : pas de cache long (le navigateur doit vérifier les MAJ)
    location ~* \.(?:js)$ {
        # Les fichiers avec hash (ex: assets/index-abc123.js) sont cachés 1 an.
        # Le SW (sw.js) n'a pas de hash -> expiré immédiatement -> le navigateur
        # compare le contenu à chaque visite et ne le retélécharge que s'il a changé.
        if ($uri ~* "^/assets/") {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        if ($uri !~* "^/assets/") {
            expires -1;
            add_header Cache-Control "no-cache";
        }
    }

    # Cache pour les assets statiques (images, CSS, fonts) - 1 an
    location ~* \.(?:css|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sécurité basique
    # Interdire l'accès aux fichiers cachés (.git, etc)
    location ~ /\. {
        deny all;
    }
}
