name: Bug report
description: Signaler un comportement inattendu
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Version de l'application (visible dans /health ou CHANGELOG.md)
      placeholder: "ex: v0.11.1"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Navigateur / appareil
      placeholder: "ex: Chrome 124, iPhone 15 Safari, TV Samsung Tizen"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Que devrait-il se passer ?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
      description: Que se passe-t-il à la place ?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur…
        2. Cliquer sur…
        3. Observer…
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte supplémentaire
      description: Captures d'écran, logs console, informations utiles
    validations:
      required: false
